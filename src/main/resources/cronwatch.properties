# CronWatch Configuration

# Alert threshold multiplier: a job is considered overdue when its
# actual duration exceeds (expectedDurationSeconds * multiplier)
alert.threshold.multiplier=1.5

# How often (in seconds) the monitor polls for overdue jobs
monitor.poll.interval.seconds=30

# Alert channels
alert.email.enabled=false
alert.log.enabled=true

# Email settings (used when alert.email.enabled=true)
alert.email.smtp.host=smtp.example.com
alert.email.smtp.port=587
alert.email.from=cronwatch@example.com
alert.email.to=ops-team@example.com

# Maximum consecutive alerts for a single overdue job before suppressing
alert.max.repeat=5
